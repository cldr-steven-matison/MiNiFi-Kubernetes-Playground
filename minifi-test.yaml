apiVersion: v1
kind: Service
metadata:
  name: minifi-test-service
spec:
  type: NodePort
  selector:
    app: minifi-test
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minifi-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minifi-test
  template:
    metadata:
      labels:
        app: minifi-test
    spec:
      serviceAccountName: minifi-controller
      containers:
      - name: minifi
        image: minifi-test:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /contentListener
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /contentListener
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10